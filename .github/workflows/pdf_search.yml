name: PDF Multi-Keyword Advanced Search

on:
  schedule:
    # 13:45 UTC translates exactly to 7:15 PM IST every day
    - cron: '45 13 * * *'
    # 15:30 UTC translates exactly to 9:00 PM IST every day
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'Direct Link to the PDF'
        required: true
        default: 'https://www.caseciter.com/content/files/2026/05/s.pdf'
      keywords:
        description: 'Keywords to search for (separate with commas)'
        required: true
        default: 'scc, insc, fundamental, religion, the act, contend, surprise, shock, shock, social, unconstitutional, disturbing'
      match_mode:
        description: 'Matching Rule Strategy'
        required: true
        default: 'any'
        type: choice
        options:
        - any
        - all

jobs:
  search-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pypdf requests

    - name: Run Search Script
      env:
        PDF_URL: ${{ github.event.inputs.pdf_url || 'https://www.caseciter.com/content/files/2026/05/s.pdf' }}
        KEYWORDS: ${{ github.event.inputs.keywords || 'scc, insc, fundamental, religion, the act, contend, surprise, shock, shock, social, unconstitutional, disturbing' }}
        MATCH_MODE: ${{ github.event.inputs.match_mode || 'any' }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python search_pdf.py
