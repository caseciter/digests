name: PDF Multi-Keyword Advanced Search

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'Direct Link to the PDF'
        required: true
        default: 'https://example.com/document.pdf'
      keywords:
        description: 'Keywords to search for (separate with commas)'
        required: true
        default: 'scc, insc, fundamental, religion, the act, contend, surprise, shock, shock, social, unconstitutional, disturbing'
      match_mode:
        description: 'Matching Rule Strategy'
        required: true
        default: 'any'
        type: choice
        options:
        - any
        - all

jobs:
  search-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pypdf requests

    - name: Run Search Script
      env:
        PDF_URL: ${{ github.event.inputs.pdf_url }}
        KEYWORDS: ${{ github.event.inputs.keywords }}
        MATCH_MODE: ${{ github.event.inputs.match_mode }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python search_pdf.py
